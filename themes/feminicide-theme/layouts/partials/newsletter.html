<section class="l-newsletter">
  <p>{{T "newsletter_text"}}</p>
<div id="rmOrganism">
  <div class="rmEmbed rmLayout--horizontal rmBase">
    <div data-page-type="formSubscribe" class="rmBase__body rmSubscription">
      <form method="post" action="https://t9b52f32b.emailsys2a.net/257/1224/6167fe5def/subscribe/form.html?_g=1765208978" class="rmBase__content">
        <div class="rmBase__container">
          <div class="rmBase__section">
            <div class="rmBase__el rmBase__el--input rmBase__el--label-pos-left" data-field="email">
              <label for="email" class="rmBase__compLabel rmBase__compLabel--hideable rmBase__compLabel--required">
                {{ T "newsletter_label_email" }}
              </label>
              <div class="rmBase__compContainer">
                <input type="text" name="email" id="email" placeholder="Email" value="" class="rmBase__comp--input comp__input">
                <div class="rmBase__compError"></div>
              </div>
            </div>
            <div class="rmBase__el rmBase__el--cta">
              <button type="submit" class="rmBase__comp--cta">
                {{ T "newsletter_label_subscribe" }}
              </button>
            </div>
          </div>
        </div>
      </form>
    </div>
    <div data-page-type="pageSubscribeSuccess" class="rmBase__body rmSubscription hidden">
      <div class="rmBase__content">
        <div class="rmBase__container">
          <div class="rmBase__section">
            <div class="rmBase__el rmBase__el--heading">
              <h1 class="rmBase__comp--heading">
                {{ T "newsletter_thankyou" }}
    <!-- this linebreak is important, don't remove it! this will force trailing linebreaks to be displayed -->
                <br>
              </h1>
            </div>
          </div>
          <div class="rmBase__section">
            <div class="rmBase__el rmBase__el--text">
              <div class="rmBase__comp--text">
                {{ T "newsletter_plsconfirm" }}
    <!-- this linebreak is important, don't remove it! this will force trailing linebreaks to be displayed -->
                <br>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
